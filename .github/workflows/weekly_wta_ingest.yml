name: Weekly WTA Ingestion

on:
  schedule:
    - cron: "0 16 * * 0"   # Sundays 16:00 UTC (adjust)
  workflow_dispatch: {}

concurrency:
  group: weekly-wta-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m pipeline.run_weekly --max-pages 40 --crawl-delay 60 --timeout-minutes 110 --schema-version v1.0 --save-artifacts

      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trailpulse_ingestion_artifacts
          path: artifacts/
          if-no-files-found: ignore
