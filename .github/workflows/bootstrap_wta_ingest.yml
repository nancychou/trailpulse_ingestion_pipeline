name: Bootstrap WTA Ingestion

on:
  workflow_dispatch:
    inputs:
      max_pages:
        description: "Max pages to crawl in this bootstrap run"
        required: true
        default: "500"
      schema_version:
        description: "Schema version tag for this run"
        required: true
        default: "v1.0"

concurrency:
  group: weekly-wta-ingestion
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 330

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bootstrap pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -m pipeline.run_weekly \
            --max-pages ${{ inputs.max_pages }} \
            --crawl-delay 60 \
            --schema-version ${{ inputs.schema_version }} \
            --save-artifacts

      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trailpulse_bootstrap_artifacts
          path: artifacts/
          if-no-files-found: ignore
